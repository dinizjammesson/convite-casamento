<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite de Casamento - Flávia & Jammesson</title>
    <style>
        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: #f4f1ea;
            color: #3e4a36;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #fff;
            width: 375px; 
            max-width: 90%;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 2px solid #a3b18a;
            position: relative;
        }

        .container::before, .container::after {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.5;
            z-index: 0;
        }
        .container::before {
            top: 10px;
            left: 10px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M10,40 Q30,10 60,30 T90,60" stroke="%233e4a36" fill="none" stroke-width="2"/></svg>');
        }
        .container::after {
            bottom: 10px;
            right: 10px;
            transform: rotate(180deg);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M10,40 Q30,10 60,30 T90,60" stroke="%233e4a36" fill="none" stroke-width="2"/></svg>');
        }

        .header {
            text-align: center;
            padding: 30px 20px 10px;
            background-color: #a3b18a;
            color: white;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3em;
            margin: 0;
            font-weight: normal;
        }

        .header p {
            font-size: 1.2em;
            margin: 5px 0 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .photo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .main-photo-container {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 6px solid #a3b18a;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .main-photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-gallery {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
        }

        .gallery-item {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #cad2c5;
            transition: transform 0.3s ease;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .details {
            text-align: center;
            padding: 0 20px 20px;
            position: relative;
            z-index: 1;
        }

        .names {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2em;
            color: #3e4a36;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .date-time {
            font-size: 1.3em;
            color: #588157;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .buttons-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 0 20px 30px;
            position: relative;
            z-index: 1;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fff;
            color: #3e4a36;
            text-decoration: none;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #a3b18a;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
        }

        .btn:hover {
            background-color: #a3b18a;
            color: white;
        }

        .btn-rsvp {
            background-color: #588157;
            color: white;
            border: none;
        }

        .btn-gift {
            background-color: #cad2c5;
            border-color: #cad2c5;
        }

        .icon {
            margin-right: 10px;
            font-size: 1.2em;
        }

        .footer {
            text-align: center;
            padding: 15px;
            background-color: #f4f1ea;
            font-size: 0.9em;
            color: #888;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Great+Vibes&display=swap');
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Nosso Casamento</h1>
        <p>Salvem a Data</p>
    </div>

    <div class="photo-section">
        <div class="main-photo-container">
            <img src="Foto1.jpeg" alt="Foto do Casal 1">
        </div>

        <div class="photo-gallery">
            <div class="gallery-item">
                <img src="Foto2.jpeg" alt="Foto do Casal 2">
            </div>
            <div class="gallery-item">
                <img src="Foto3.jpeg" alt="Foto do Casal 3">
            </div>
        </div>
    </div>

    <div class="details">
        <div class="names">Flávia & Jammesson</div>
        <div class="date-time">Sábado, 05 de Setembro de 2026 às 18:30h</div>
        <p>Convidam para a celebração de sua união.</p>
    </div>

    <div class="buttons-section">
        <a href="https://www.google.com/maps/search/?api=1&query=Rua+Manoel+Ribeiro+da+Silva,04,Rio+Doce,Olinda" target="_blank" class="btn">
            <span class="icon">📍</span> Ver Endereço da Igreja
        </a>

        <a href="https://www.google.com/maps/search/?api=1&query=Degust+Recepções+Av+Carlos+de+Lima+Cavalcante+4639" target="_blank" class="btn">
            <span class="icon">🥂</span> Ver Local da Recepção
        </a>

        <a href="https://api.whatsapp.com/send?phone=5581987485920&text=Olá! Confirmo minha presença no casamento de Flávia e Jammesson." target="_blank" class="btn btn-rsvp">
            <span class="icon">✅</span> Confirmar Presença (RSVP)
        </a>

        <a href="#" target="_blank" class="btn btn-gift">
            <span class="icon">🎁</span> Nossa Lista de Presentes
        </a>
    </div>

    <div class="footer">
        Com carinho, os noivos.
    </div>
</div>

</body>
</html>
